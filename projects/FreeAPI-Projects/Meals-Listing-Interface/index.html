<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Culinary Canvas - Premium Meals</title>
    <meta name="description" content="Discover exquisite meals and recipes with our premium culinary listing interface.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="header-bg-glow"></div>
        <div class="header-content">
          <h1>Culinary Canvas</h1>
          <p>Discover Exquisite Meals & Recipes</p>
          <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search for meals (e.g., chicken, rice)..." />
            <button id="searchBtn" aria-label="Search">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
          </div>
        </div>
      </header>

      <main class="main-content">
        <div id="loading" class="loading-state hidden">
          <div class="spinner"></div>
          <p>Curating recipes...</p>
        </div>
        <div id="errorState" class="error-state hidden">
          <p id="errorMessage">Failed to load meals.</p>
          <button id="retryBtn">Try Again</button>
        </div>
        <div id="emptyState" class="empty-state hidden">
          <div class="empty-icon">🍽️</div>
          <p>No meals found for your search.</p>
          <button id="clearSearchBtn">Clear Search</button>
        </div>
        <div id="mealsGrid" class="meals-grid">
          <!-- Meal cards will be inserted here -->
        </div>
        <div class="pagination-container" id="paginationContainer">
           <button id="prevBtn" class="pagination-btn" disabled>
             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
             Previous
           </button>
           <div class="page-indicators" id="pageIndicators">
             <!-- Page dots/numbers go here if needed -->
           </div>
           <button id="nextBtn" class="pagination-btn" disabled>
             Next
             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
           </button>
        </div>
      </main>

      <footer class="footer">
        <p>&copy; <span id="year"></span> Culinary Canvas. Powered by FreeAPI.</p>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
