<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspire | Premium Quotes Gallery</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body class="font-sans antialiased selection:bg-indigo-500/30">
    <div id="app" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <!-- Header -->
      <header class="mb-16 text-center">
        <h1 class="text-5xl md:text-7xl font-serif font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-300 via-purple-300 to-pink-300 mb-4 tracking-tight drop-shadow-sm">
          Inspire.
        </h1>
        <p class="text-lg md:text-xl text-gray-400 max-w-2xl mx-auto font-light">
          Discover profound thoughts from brilliant minds. A curated collection of wisdom to elevate your perspective.
        </p>
      </header>

      <!-- Controls -->
      <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
        <div class="relative w-full md:w-96 group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-400 transition-colors">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </div>
          <input 
            type="text" 
            id="searchInput" 
            placeholder="Search by keyword or author..." 
            class="w-full pl-11 pr-4 py-3 bg-white/5 border border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-transparent transition-all text-white placeholder-gray-500 shadow-inner backdrop-blur-sm"
          />
        </div>
      </div>

      <!-- Loading State -->
      <div id="loadingIndicator" class="hidden flex justify-center items-center py-20">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-400"></div>
      </div>

      <!-- Quotes Grid -->
      <div id="quotesGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 auto-rows-max">
        <!-- Quotes will be dynamically injected here -->
      </div>

      <!-- Error State -->
      <div id="errorState" class="hidden text-center py-20">
        <p class="text-red-400 text-lg" id="errorMessage">Failed to load quotes. Please try again later.</p>
        <button id="retryButton" class="mt-4 px-6 py-2 bg-white/10 hover:bg-white/20 rounded-full transition-colors border border-white/5">Retry</button>
      </div>

      <!-- Empty State -->
      <div id="emptyState" class="hidden text-center py-20">
        <p class="text-gray-400 text-lg">No quotes found matching your search.</p>
      </div>

      <!-- Pagination -->
      <div class="mt-16 flex justify-center items-center gap-4" id="paginationControls">
        <button id="prevBtn" class="px-5 py-2.5 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 group">
          <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
          Previous
        </button>
        <span id="pageInfo" class="text-sm text-gray-400 font-medium tracking-wide">Page 1 of 1</span>
        <button id="nextBtn" class="px-5 py-2.5 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 group">
          Next
          <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
        </button>
      </div>
    </div>
    
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
