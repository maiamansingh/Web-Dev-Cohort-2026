<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A beautiful and interactive viewer for random jokes, powered by FreeAPI." />
    <title>Giggles | Premium Jokes Viewer</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-gray-950 text-slate-200 font-sans antialiased min-h-screen selection:bg-indigo-500 selection:text-white">
    <div id="app" class="relative min-h-screen overflow-hidden">
      <!-- Background Ambient Glow -->
      <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-600/30 blur-[120px] rounded-full pointer-events-none"></div>
      <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/30 blur-[120px] rounded-full pointer-events-none"></div>
      
      <!-- Main Content -->
      <main class="relative z-10 max-w-5xl mx-auto px-6 py-12 flex flex-col items-center">
        <!-- Header -->
        <header class="text-center mb-12 animate-fade-in-down">
          <div class="inline-flex items-center justify-center space-x-3 mb-4">
            <div class="w-10 h-10 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
              </svg>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 tracking-tight">
              Giggles
            </h1>
          </div>
          <p class="text-lg text-slate-400 max-w-xl mx-auto font-light">
            Discover a curated collection of hilarious jokes. Take a break, have a laugh, and brighten your day.
          </p>
        </header>

        <!-- Controls -->
        <div class="w-full max-w-3xl flex flex-col sm:flex-row gap-4 justify-between items-center mb-8 animate-fade-in">
          <!-- Search / Category -->
          <div class="relative w-full sm:w-auto flex-1 max-w-md">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
              </svg>
            </div>
            <input 
              type="text" 
              id="searchInput" 
              placeholder="Search jokes... (e.g. science, dad)" 
              class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 transition-all text-slate-200 placeholder-slate-500 backdrop-blur-md shadow-inner"
            />
          </div>
          
          <!-- Fetch Button -->
          <button id="fetchBtn" class="group relative inline-flex items-center justify-center px-8 py-3 font-semibold text-white transition-all duration-300 ease-in-out bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl hover:from-indigo-400 hover:to-purple-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-gray-900 shadow-[0_0_20px_rgba(99,102,241,0.4)] hover:shadow-[0_0_30px_rgba(99,102,241,0.6)] hover:-translate-y-0.5 active:translate-y-0 w-full sm:w-auto">
            <span class="mr-2">Fetch New Jokes</span>
            <svg class="w-5 h-5 group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
          </button>
        </div>

        <!-- Status / Error Message -->
        <div id="statusMessage" class="hidden w-full max-w-3xl mb-6 p-4 rounded-xl text-center text-sm font-medium border">
        </div>

        <!-- Jokes Container -->
        <div id="jokesContainer" class="w-full max-w-3xl flex flex-col gap-6">
          <!-- Skeletons will be injected here during loading -->
          <!-- Cards will be injected here -->
        </div>
        
        <!-- Pagination Controls -->
        <div id="paginationContainer" class="hidden w-full max-w-3xl mt-10 flex justify-between items-center bg-white/5 backdrop-blur-md border border-white/10 p-4 rounded-2xl">
          <button id="prevBtn" disabled class="px-5 py-2 text-sm font-medium text-slate-300 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 hover:text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            Previous
          </button>
          <div class="text-sm text-slate-400 font-medium">
            Page <span id="currentPageDisplay" class="text-white">1</span> of <span id="totalPagesDisplay" class="text-white">1</span>
          </div>
          <button id="nextBtn" disabled class="px-5 py-2 text-sm font-medium text-slate-300 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 hover:text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center">
            Next
            <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </button>
        </div>

      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
