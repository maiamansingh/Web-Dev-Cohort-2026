<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream - Premium Video Discovery</title>
    <meta name="description" content="Discover and stream the latest high-quality videos on Stream.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

<body>
    <header class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            <h1>Stream</h1>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search videos...">
            <button id="searchBtn" aria-label="Search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </div>
        <div class="profile-placeholder"></div>
    </header>

    <main class="main-content">
        <div class="filters">
            <button class="filter-btn active">All</button>
            <button class="filter-btn">JavaScript</button>
            <button class="filter-btn">React</button>
            <button class="filter-btn">Next.js</button>
            <button class="filter-btn">Node.js</button>
            <button class="filter-btn">TypeScript</button>
            <button class="filter-btn">CSS</button>
        </div>

        <section id="videoGrid" class="video-grid">
            <!-- Skeletons for initial loading -->
            <div class="video-card skeleton-card">
                <div class="thumbnail-container"></div>
                <div class="video-info">
                    <div class="channel-avatar"></div>
                    <div class="video-details" style="width: 100%;">
